name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Import smoke check
        run: python -c "import jwt, sqlalchemy, celery, fastapi, pydantic, cryptography"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: CLI smoke test (offline)
        run: |
          gnsis version
          gnsis demo --workdir "$RUNNER_TEMP/gnsis-demo"

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gnsis
          POSTGRES_PASSWORD: gnsis
          POSTGRES_DB: gnsis
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://gnsis:gnsis@localhost:5432/gnsis
      REDIS_URL: redis://localhost:6379/0
      GNSIS_EXECUTION_PROVIDER: github_actions
      GNSIS_PUBLIC_API_URL: https://api.test.invalid
      GNSIS_EXECUTOR_OWNER: gnsis-test
      GNSIS_EXECUTOR_REPO: executor-test
      GNSIS_EXECUTOR_WORKFLOW: execute.yml
      GNSIS_EXECUTOR_REF: main
      GNSIS_EXECUTOR_OIDC_ISSUER: https://token.actions.githubusercontent.com
      GNSIS_EXECUTOR_OIDC_AUDIENCE: https://api.gnsis.studio
      GNSIS_EXECUTOR_TRUSTED_WORKFLOW_SHA: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Import smoke check
        run: python -c "import jwt, sqlalchemy, celery, fastapi, pydantic, cryptography"
      - name: Run integration tests
        run: python -m pytest tests/integration -v
