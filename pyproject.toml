[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gnsis"
description = "A stable, dogfoodable self-evolution runtime for tool-calling LLM agents."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Aubin Cooper", email = "aubincorinaldiecooper@gmail.com" }]
keywords = ["agents", "llm", "self-evolution", "tool-calling", "openrouter"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
# Core is standard-library only — no install-time dependencies.
dependencies = []
dynamic = ["version"]

[project.optional-dependencies]
dev = ["pytest>=7"]
# The Railway service layer (API + worker). The core stays dependency-free;
# these are only needed to run the FastAPI app and Celery worker.
server = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "celery>=5.3",
    "redis>=5.0",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
    "pydantic>=2.6",
    "pyjwt>=2.8",
    "httpx>=0.27",
]

[project.scripts]
gnsis = "gnsis.cli:main"

[project.urls]
Homepage = "https://github.com/aubincorinaldiecooper-bit/gnsis"
"Inspired by" = "https://github.com/DVampire/Autogenesis"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = { attr = "gnsis.__about__.__version__" }
