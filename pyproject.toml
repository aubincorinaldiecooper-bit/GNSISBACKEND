[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gnsis"
description = "A stable, dogfoodable self-evolution runtime for tool-calling LLM agents."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Aubin Cooper", email = "aubincorinaldiecooper@gmail.com" }]
keywords = ["agents", "llm", "self-evolution", "tool-calling", "openrouter"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
# Core is standard-library only — no install-time dependencies.
dependencies = []
dynamic = ["version"]

[project.optional-dependencies]
# `httpx` is required by FastAPI's TestClient, used by the service auth/tenancy
# tests. It's a test-only dependency; the runtime service does not need it.
dev = ["pytest>=7", "httpx>=0.27"]
# The Railway deployment surface (FastAPI API + Celery worker + Postgres).
# The GNSIS core stays standard-library only; these are needed only to run the
# service. Install with: pip install -e ".[service]"
service = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "celery[redis]>=5.3",
    "redis>=5.0",
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.1",
    "pydantic>=2",
    "PyJWT>=2.8",
    "cryptography>=42",
    "claude-agent-sdk>=0.1",
]

[project.scripts]
gnsis = "gnsis.cli:main"
gnsis-migrate = "gnsis.service.db:init_db"

[project.urls]
Homepage = "https://github.com/aubincorinaldiecooper-bit/gnsis"
"Inspired by" = "https://github.com/DVampire/Autogenesis"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = { attr = "gnsis.__about__.__version__" }
